name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  pypi:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Get project name and version from pyproject.toml
        id: meta
        run: |
          python3 <<'PY'
          import os, tomllib, pathlib
          p = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={p['version']}\n")
              f.write(f"name={p['name']}\n")
          PY
        shell: bash

      - name: Build CLI package
        run: |
          rm -rf dist/ build/ *.egg-info
          uv build

      - name: Publish CLI to PyPI
        run: |
          uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
