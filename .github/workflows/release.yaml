name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  pypi:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Get project name and version from pyproject.toml
        id: meta
        run: |
          python3 <<'PY'
          import os, tomllib, pathlib
          p = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={p['version']}\n")
              f.write(f"name={p['name']}\n")
          PY
        shell: bash

      - name: Build CLI package
        run: |
          rm -rf dist/ build/ *.egg-info
          uv build

      - name: Publish CLI to PyPI
        run: |
          uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
